<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حاسبة الخماسي التفاعلية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; }
        h2 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin: 20px 0; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        input { padding: 10px; font-size: 18px; width: 80px; border: 2px solid #ddd; border-radius: 5px; text-align: center; }
        .angles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .angle-box { background: #eef2f3; padding: 10px; border-radius: 8px; font-size: 14px; }
        .angle-val { display: block; font-weight: bold; color: #2980b9; font-size: 18px; margin-top: 5px; }
        button { background-color: #4CAF50; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background-color: #45a049; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; }
        .success { background-color: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; }
        .error { background-color: #f2dede; color: #a94442; border: 1px solid #ebccd1; }
    </style>
</head>
<body>

<div class="card">
    <h2>حاسبة زوايا الشكل الخماسي</h2>
    <p>أوجد قياسات الزوايا بناءً على قيمة $x$ (المسألة 1B)</p>

    <div class="input-group">
        <label>أدخل قيمة $x$: </label>
        <input type="number" id="xValue" placeholder="؟" oninput="calculate()">
    </div>

    <div class="angles-grid">
        <div class="angle-box">الزاوية J<span class="angle-val">142°</span></div>
        <div class="angle-box">الزاوية H (2x)<span id="angleH" class="angle-val">-</span></div>
        <div class="angle-box">الزاوية K (2x)<span id="angleK" class="angle-val">-</span></div>
        <div class="angle-box">الزاوية M (3x+14)<span id="angleM" class="angle-val">-</span></div>
        <div class="angle-box">الزاوية L (3x+14)<span id="angleL" class="angle-val">-</span></div>
    </div>

    <div id="result"></div>
    
    <button onclick="checkAnswer()">تحقق من المجموع</button>
</div>

<script>
    function calculate() {
        let x = parseFloat(document.getElementById('xValue').value);
        if (isNaN(x)) return;

        // المعادلات من الصورة
        let angle2x = 2 * x;
        let angle3x14 = (3 * x) + 14;

        document.getElementById('angleH').innerText = angle2x + "°";
        document.getElementById('angleK').innerText = angle2x + "°";
        document.getElementById('angleM').innerText = angle3x14 + "°";
        document.getElementById('angleL').innerText = angle3x14 + "°";
    }

    function checkAnswer() {
        let x = parseFloat(document.getElementById('xValue').value);
        let resultDiv = document.getElementById('result');
        
        if (isNaN(x)) {
            resultDiv.style.display = "block";
            resultDiv.className = "error";
            resultDiv.innerText = "يرجى إدخال قيمة لـ x أولاً";
            return;
        }

        let total = 142 + (2*x) + (2*x) + (3*x+14) + (3*x+14);
        resultDiv.style.display = "block";

        if (total === 540) {
            resultDiv.className = "success";
            resultDiv.innerHTML = "رائع! المجموع هو 540° وهو يطابق القانون تماماً. <br> إجابتك صحيحة (x = 37)";
        } else {
            resultDiv.className = "error";
            resultDiv.innerText = "المجموع الحالي هو " + total + "°. حاول مرة أخرى للوصول إلى 540°.";
        }
    }
</script>

</body>
</html>
